<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BookStore</title>

<!-- Bootstrap CSS -->
<link th:fragment="link-css"
      rel="stylesheet"
      th:href="@{/css/bootstrap.min.css}">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<!-- Custom CSS -->
<link th:fragment="custom-css"
      rel="stylesheet"
      th:href="@{/css/style.css}">

</head>

<body class="d-flex flex-column min-vh-100">

<!-- ================= HEADER ================= -->

<header th:fragment="header">

<nav class="navbar navbar-expand-lg navbar-dark bg-secondary shadow-sm">

<div class="container">

<!-- LOGO -->

<a class="navbar-brand d-flex align-items-center"
   th:href="@{/books}">

<img th:src="@{/images/book-logo.png}"
     width="30"
     height="30"
     class="me-2">

BookStore

</a>

<!-- MOBILE BUTTON -->

<button class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarSupportedContent">

<span class="navbar-toggler-icon"></span>

</button>

<!-- MENU -->

<div class="collapse navbar-collapse"
     id="navbarSupportedContent">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link"
   th:href="@{/}">
Home
</a>

</li>

<li class="nav-item">

<a class="nav-link"
   th:href="@{/books}">
Books
</a>

</li>

<li class="nav-item"
sec:authorize="hasAuthority('Admin')">

<a class="nav-link"
   th:href="@{/books/add}">

<i class="bi bi-plus-circle"></i>
Add Book

</a>

</li>

</ul>

<!-- RIGHT SIDE -->

<ul class="navbar-nav">

<!-- CART -->

<li class="nav-item">

<a class="nav-link position-relative"
   th:href="@{/cart}">

<i class="bi bi-cart-fill"></i>

<span class="badge bg-danger
position-absolute
top-0 start-100
translate-middle"
th:text="${cartQuantity}">
0
</span>

</a>

</li>

<!-- USER DROPDOWN -->

<li class="nav-item dropdown"
sec:authorize="isAuthenticated()">

<a class="nav-link dropdown-toggle d-flex align-items-center"
   href="#"
   role="button"
   data-bs-toggle="dropdown"
   aria-expanded="false">

<i class="bi bi-person-circle me-2"></i>

<span sec:authentication="name"></span>

</a>

<ul class="dropdown-menu dropdown-menu-end shadow">

<li>

<a class="dropdown-item"
href="#">

<i class="bi bi-person me-2"></i>
Profile

</a>

</li>

<li>

<a class="dropdown-item"
href="#">

<i class="bi bi-gear me-2"></i>
Settings

</a>

</li>

<li><hr class="dropdown-divider"></li>

<li>

<form th:action="@{/logout}" method="post">

<button class="dropdown-item text-danger">

<i class="bi bi-box-arrow-right me-2"></i>
Logout

</button>

</form>

</li>

</ul>

</li>

<!-- LOGIN -->

<li class="nav-item"
sec:authorize="!isAuthenticated()">

<a class="btn btn-outline-light btn-sm"
   th:href="@{/login}">

Login

</a>

</li>

</ul>

</div>

</div>

</nav>

</header>

<!-- ================= CONTENT ================= -->



<!-- ================= FOOTER ================= -->

<footer th:fragment="footer"
class="mt-auto py-4 bg-dark text-white">

<div class="container">

<div class="row">

<div class="col-md-6">

<h5>BookStore</h5>

<p>123 Main Street</p>

<p>Email: info@bookstore.com</p>

</div>

<div class="col-md-6 text-md-end">

<p>

©
<span th:text="${#dates.year(#dates.createNow())}"></span>
BookStore. All rights reserved.

</p>

</div>

</div>

</div>

<!-- JS -->

<script th:src="@{/js/jquery-3.7.0.min.js}"></script>

<!-- Bootstrap bundle (có Popper → dropdown chạy) -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</footer>

</body>

</html>
