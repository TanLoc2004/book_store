<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<th:block th:replace="~{layout::link-css}"></th:block>
<th:block th:replace="~{layout::custom-css}"></th:block>

<style>

body{
background:#f5f6fa;
}

.page-title{
font-weight:700;
margin-bottom:20px;
}

.book-card{
border:none;
border-radius:12px;
overflow:hidden;
transition:0.25s;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.book-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.book-img{
height:240px;
object-fit:cover;
}

.book-title{
font-weight:600;
font-size:16px;
margin-bottom:4px;
}

.book-author{
font-size:14px;
color:#777;
}

.price{
color:#e63946;
font-weight:700;
font-size:18px;
}

.card-footer{
background:white;
border-top:none;
}

.search-box{
max-width:350px;
}

</style>

</head>

<body>

<th:block th:replace="~{layout::header}"></th:block>

<div class="container mt-4">

<!-- TITLE + SEARCH -->

<div class="row mb-4 align-items-center">

<div class="col-md-6">

<h2 class="page-title">
<i class="bi bi-book"></i> Book Store
</h2>

</div>

<div class="col-md-6">

<form class="d-flex justify-content-md-end search-box"
      th:action="@{/books/search}"
      method="get">

<input class="form-control me-2"
       type="search"
       placeholder="Search book..."
       name="keyword">

<button class="btn btn-primary" type="submit">
<i class="bi bi-search"></i>
</button>

</form>

</div>

</div>

<!-- BOOK GRID -->

<div class="row g-4">

<div class="col-lg-3 col-md-4 col-sm-6"
     th:each="book : ${books}">

<div class="card book-card h-100">

<!-- IMAGE -->

<img th:src="@{/images/book-default.png}"
     class="card-img-top book-img">

<div class="card-body">

<h6 class="book-title"
    th:text="${book.title}">
</h6>

<p class="book-author"
   th:text="${book.author}">
</p>

<div class="price mb-2">
$<span th:text="${book.price}"></span>
</div>

<span class="badge bg-secondary"
      th:text="${book.category.name}">
</span>

</div>

<div class="card-footer">

<div class="d-flex justify-content-between">

<!-- DETAIL -->

<a class="btn btn-sm btn-outline-primary"
   th:href="@{/books/detail/{id}(id=${book.id})}">
<i class="bi bi-eye"></i>
</a>

<!-- ADD CART -->

<form th:action="@{/books/add-to-cart}"
      method="post">

<input type="hidden"
       name="id"
       th:value="${book.id}">

<input type="hidden"
       name="name"
       th:value="${book.title}">

<input type="hidden"
       name="price"
       th:value="${book.price}">

<button class="btn btn-sm btn-success">
<i class="bi bi-cart-plus"></i>
</button>

</form>

</div>

<!-- ADMIN ACTION -->

<div class="mt-2"
sec:authorize="hasAnyAuthority('Admin')">

<a class="btn btn-sm btn-warning"
   th:href="@{/books/edit/{id}(id=${book.id})}">
<i class="bi bi-pencil"></i>
</a>

<a class="btn btn-sm btn-danger"
   th:href="@{/books/delete/{id}(id=${book.id})}"
   onclick="return confirm('Delete this book?')">
<i class="bi bi-trash"></i>
</a>

</div>

</div>

</div>

</div>

</div>

<!-- PAGINATION -->

<nav class="mt-4">

<ul class="pagination justify-content-center">

<li class="page-item"
    th:each="i : ${#numbers.sequence(0, totalPages)}"
    th:classappend="${currentPage == i} ? 'active'">

<a class="page-link"
   th:href="@{/books(pageNo=${i})}"
   th:text="${i}">
</a>

</li>

</ul>

</nav>

</div>

<th:block th:replace="~{layout::footer}"></th:block>

</body>
</html>
